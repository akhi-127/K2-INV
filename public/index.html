<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>K2 Inventory — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111416;--panel:rgba(22,26,31,.95);--line:rgba(255,255,255,.08);
  --text:#e6e9ed;--muted:#7a8694;--faint:#4a5260;
  --accent:#c8a96e;--accent2:#e0c080;
  --ok:#5aaa7a;--critical:#e05c4b;
}
body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:48px 48px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at -5% 0%,rgba(200,169,110,.07) 0%,transparent 65%)}
.box{
  position:relative;z-index:1;
  width:380px;max-width:calc(100vw - 32px);
  background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:32px;
  backdrop-filter:blur(12px);
}
.logo{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.04);border-radius:8px;padding:3px;margin-bottom:22px;border:1px solid var(--line)}
.tab{flex:1;padding:7px;border-radius:6px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;transition:all .15s}
.tab.active{background:#1c2128;color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input{width:100%;padding:9px 12px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:'Geist',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.field input:focus{border-color:rgba(200,169,110,.4);background:rgba(200,169,110,.04)}
.field input::placeholder{color:var(--faint)}
.btn{width:100%;padding:10px;background:var(--accent);color:#111;border:none;border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.google-btn{
  width:100%;padding:10px;background:#fff;color:#111;
  border:1px solid rgba(255,255,255,.2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;
  text-decoration:none;margin-bottom:4px;font-family:'Geist',sans-serif;
}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--faint);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.err{font-size:12px;color:var(--critical);margin-top:10px;text-align:center;min-height:18px}
.ok{font-size:12px;color:var(--ok);margin-top:10px;text-align:center}
/* Mountain watermark */
.mountain{position:fixed;bottom:0;right:0;width:65vw;max-width:860px;pointer-events:none;opacity:.05;z-index:0}
</style>
</head>
<body>

<svg class="mountain" viewBox="0 0 900 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="450,15 200,380 700,380" fill="#4a3c28"/>
  <polygon points="450,15 395,130 505,130" fill="#e8dfc8"/>
  <rect x="0" y="378" width="900" height="122" fill="#1a1510"/>
</svg>

<div class="box">
  <div class="logo"><span>K2</span> Inventory</div>
  <div class="sub">Platform v2 — sign in to access your workspace</div>

  <a class="google-btn" href="/api/auth/google">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <div class="divider">or</div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('login',this)">Sign In</button>
    <button class="tab" onclick="setTab('signup',this)">Create Account</button>
  </div>

  <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div>
  <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/></div>
  <div class="field" id="confirmField" style="display:none"><label>Confirm Password</label><input type="password" id="confirm" placeholder="••••••••"/></div>

  <button class="btn" id="submitBtn" onclick="submit()">Sign In</button>
  <div class="err" id="err"></div>
  <div class="ok hidden" id="ok"></div>
</div>

<script>
let mode = 'login';
function setTab(m, btn) {
  mode = m;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('submitBtn').textContent = m === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('confirmField').style.display = m === 'signup' ? '' : 'none';
  document.getElementById('err').textContent = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

async function submit() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('submitBtn');
  err.textContent = '';

  if (!email || !password) { err.textContent = 'Please enter email and password.'; return; }

  if (mode === 'signup') {
    const confirm = document.getElementById('confirm').value;
    if (password !== confirm) { err.textContent = 'Passwords do not match.'; return; }
    if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }
  }

  btn.disabled = true;
  btn.textContent = 'Please wait…';

  try {
    const res = await fetch('/api/auth/' + mode, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Authentication failed.'; }
    else if (data.requiresConfirmation) {
      document.getElementById('ok').textContent = 'Check your email to confirm, then sign in.';
      document.getElementById('ok').classList.remove('hidden');
    }
    else { window.location.href = '/dashboard'; }
  } catch { err.textContent = 'Connection error. Try again.'; }

  btn.disabled = false;
  btn.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
}
</script>
</body>
</html>
